<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addmission process</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <h2>Addmission process</h2>

<form>
    <label>Full Name:</label><br>
    <input type="text" name="name" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>

    <label>Phone Number:</label><br>
    <input type="tel" name="phone"><br><br>

    <label>Gender:</label><br>
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <br><br>

    <label>Select Engineering Branch:</label><br>
    <select name="branch">
        <option>Select Branch</option>
        <option>Computer Engineering</option>
        <option>Mechanical Engineering</option>
        <option>Civil Engineering</option>
        <option>Electrical Engineering</option>
        <option>Electronics Engineering</option>
    </select>
    <br><br>

    <label>Address:</label><br>
    <textarea name="address" rows="4" cols="30"></textarea>
    <br><br>

    <label>Upload Marksheet:</label><br>
    <input type="file" name="marksheet"><br><br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>
</body>
</html>
